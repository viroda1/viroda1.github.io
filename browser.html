<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viro XYZ | Interstellar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
    --accent: #ff4aff;
    --bg: #000;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

body {
    height:100vh;
    background: linear-gradient(#000,#050005);
    color:#fff;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
}

/* Star canvas */
#starCanvas {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Navbar */
.nav-bar{
    display:flex;
    align-items:center;
    padding:12px 25px;
    background: rgba(0,0,0,0.7);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    z-index:10;
}

.logo{font-weight:700;color:var(--accent);font-size:1.2rem;cursor:pointer;letter-spacing:1px;}

.search-area{flex-grow:1;position:relative;}

#urlInp{width:100%;background: var(--glass); border:1px solid var(--border); border-radius:12px; padding:10px 15px; color:#fff; font-size:0.9rem; outline:none;}
#urlInp:focus{border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 74, 255,0.4);}

/* Buttons */
button{cursor:pointer;border:none;border-radius:8px;padding:6px 10px;background:var(--accent);color:#000;margin-left:10px;}

/* Loading Bar */
.loading{position:absolute;bottom:-2px;left:0;height:2px;width:0%;background:var(--accent);transition:width 0.4s ease;}

/* iframe */
#contentFrame{flex-grow:1;width:100%;border:none;display:none;background:#111;}

/* Home UI */
.home-ui{flex-grow:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}

.hero-title{font-size:4rem;font-weight:700;background: linear-gradient(90deg,#ff4aff,#ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.hero-sub{color:#777;letter-spacing:6px;font-size:0.8rem;margin-bottom:40px;text-transform:uppercase;}

/* Cards */
.card-grid{display:flex;gap:20px;max-width:800px;flex-wrap:wrap;justify-content:center;}
.card{background: var(--glass); border:1px solid var(--border); padding:20px; border-radius:18px; flex:1; min-width:180px; cursor:pointer; transition:0.25s; text-align:center;}
.card:hover{border-color: var(--accent); background: rgba(255,74,255,0.05); transform: translateY(-6px); box-shadow: 0 15px 40px rgba(255,74,255,0.25);}

/* Config/menus */
#configPanel, #menuPanel{
    position: fixed;
    top:50px; right:20px;
    background: rgba(0,0,0,0.85);
    border:1px solid var(--border);
    border-radius:12px;
    padding:15px;
    display:none;
    flex-direction:column;
    gap:10px;
    z-index:20;
    backdrop-filter:blur(15px);
}

#configPanel label, #menuPanel label{font-size:0.85rem;color:#aaa;margin-bottom:4px;}
#configPanel input, #menuPanel input, #menuPanel select{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:#fff;outline:none;}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<nav class="nav-bar">
    <div class="logo" onclick="goHome()">Viro XYZ</div>
    <div class="search-area">
        <input type="text" id="urlInp" placeholder="Enter URL or search..." autocomplete="off">
        <div class="loading" id="loadingBar"></div>
    </div>
    <button onclick="toggleConfig()">⚙️ Config</button>
    <button onclick="toggleMenu()">☰ Menu</button>
</nav>

<iframe id="contentFrame"></iframe>

<div class="home-ui" id="homeUI">
    <h1 class="hero-title">Viro XYZ</h1>
    <p class="hero-sub">Interstellar Proxy Mode</p>
    <div class="card-grid">
        <div class="card" onclick="loadSite('https://www.wikipedia.org')"><h3>Wikipedia</h3><p>Research Hub</p></div>
        <div class="card" onclick="loadSite('https://poki.com')"><h3>Games</h3><p>Activity Portal</p></div>
        <div class="card" onclick="loadSite('bio.html')"><h3>Bio</h3><p>System Logs</p></div>
    </div>
</div>

<!-- Config -->
<div id="configPanel">
    <label for="starDensity">Star Density:</label>
    <input type="range" id="starDensity" min="50" max="500" value="200">
    
    <label for="accentColor">Accent Color:</label>
    <input type="color" id="accentColor" value="#ff4aff">
    
    <button onclick="applySettings()">Apply</button>
</div>

<!-- Menu -->
<div id="menuPanel">
    <button onclick="deleteHistory()">🗑️ Delete History</button>
    <button onclick="inspectElement()">🔍 Inspect Element</button>
    <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <button onclick="warpSpeed()">💫 Warp Speed!</button>
</div>

<script>
/* ------------------ Stars ------------------ */
const starCanvas=document.getElementById('starCanvas');
const ctx=starCanvas.getContext('2d');
let stars=[];
let starCount=parseInt(document.getElementById('starDensity').value);

function resizeCanvas(){starCanvas.width=window.innerWidth;starCanvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function createStars(){
    stars=[];
    for(let i=0;i<starCount;i++){
        stars.push({x:Math.random()*starCanvas.width,y:Math.random()*starCanvas.height,radius:Math.random()*1.5+0.5,alpha:Math.random()});
    }
}
function drawStars(){
    ctx.clearRect(0,0,starCanvas.width,starCanvas.height);
    stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);ctx.fillStyle='rgba(255,74,255,'+s.alpha+')';ctx.fill();});
}
function animateStars(){
    stars.forEach(s=>{s.alpha+=(Math.random()-0.5)*0.02;if(s.alpha<0)s.alpha=0;if(s.alpha>1)s.alpha=1;});
    drawStars();
    requestAnimationFrame(animateStars);
}
createStars();
animateStars();

/* ------------------ Core ------------------ */
const urlInp=document.getElementById('urlInp');
const frame=document.getElementById('contentFrame');
const homeUI=document.getElementById('homeUI');
const loadingBar=document.getElementById('loadingBar');
const configPanel=document.getElementById('configPanel');
const menuPanel=document.getElementById('menuPanel');
let historyList=[];

function loadSite(url){
    homeUI.style.display='none';
    frame.style.display='block';
    loadingBar.style.width="30%";
    setTimeout(()=>loadingBar.style.width="70%",200);
    frame.src=url;
    frame.onload=()=>{loadingBar.style.width="100%";setTimeout(()=>loadingBar.style.width="0%",300);}
    historyList.push(url);
}

function goHome(){frame.style.display='none';homeUI.style.display='flex';frame.src="";}

urlInp.addEventListener('keypress',(e)=>{
    if(e.key==='Enter'){
        let val=urlInp.value.trim();
        if(!val) return;
        let finalUrl;
        if(val.includes('.')&&!val.includes(' ')) finalUrl=val.startsWith('http')?val:'https://'+val;
        else finalUrl='https://duckduckgo.com/?q='+encodeURIComponent(val);
        loadSite(finalUrl);
    }
});
document.addEventListener('keydown',(e)=>{if(e.key==='Escape') goHome();});
window.onload=()=>{urlInp.focus();};

/* ------------------ Config ------------------ */
function toggleConfig(){configPanel.style.display=configPanel.style.display==='flex'?'none':'flex';}
function applySettings(){
    const density=parseInt(document.getElementById('starDensity').value);
    const accent=document.getElementById('accentColor').value;
    document.documentElement.style.setProperty('--accent',accent);
    starCount=density;
    createStars();
}

/* ------------------ Menu ------------------ */
function toggleMenu(){menuPanel.style.display=menuPanel.style.display==='flex'?'none':'flex';}
function deleteHistory(){historyList=[];alert('History cleared!');}
function inspectElement(){
    let el=prompt('Enter CSS selector to inspect inside iframe (example: body, h1):');
    if(el){
        let doc=frame.contentDocument||frame.contentWindow.document;
        let found=doc.querySelector(el);
        alert(found?found.outerHTML:'Element not found.');
    }
}
function toggleFullscreen(){if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen();}
function warpSpeed(){stars.forEach(s=>s.x-=Math.random()*5); drawStars();}
</script>

</body>
</html>
