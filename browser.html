<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viro XYZ; learning platform</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<!-- This script helps bypass some iframe blocks for specific sites -->
<script src="https://unpkg.com"></script>
<script type="module" src="https://unpkg.com"></script>

<style>
:root { --accent: #9d4edd; --bg: #050507; --glass: rgba(255, 255, 255, 0.03); --border: rgba(157, 78, 221, 0.15); }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; transition: 0.3s; }

body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Navbar */
.nav-bar { 
    display: flex; align-items: center; padding: 10px 20px; 
    background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); 
}
.logo { font-weight: 700; color: var(--accent); margin-right: 20px; font-size: 0.9rem; }

.search-area { flex-grow: 1; position: relative; }
#urlInp { 
    width: 100%; background: var(--glass); border: 1px solid var(--border); 
    border-radius: 8px; padding: 8px 15px; color: #fff; outline: none; font-size: 0.85rem;
}

/* Viewport Window */
#contentFrame {
    flex-grow: 1;
    width: 100%;
    border: none;
    background: #fff; /* Most sites expect a white background */
    display: none; /* Hidden until a search is made */
}

/* Home State */
.home-ui { 
    flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
    text-align: center; padding: 20px;
}
.hero-title { font-size: 4rem; font-weight: 700; margin-bottom: 0; }
.hero-sub { color: #555; letter-spacing: 5px; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 40px; }

.card-grid { display: flex; gap: 20px; max-width: 800px; }
.card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 15px; flex: 1; cursor: pointer; }
.card:hover { border-color: var(--accent); background: rgba(157, 78, 221, 0.05); }

</style>
</head>
<body>

<nav class="nav-bar">
    <div class="logo" onclick="goHome()" style="cursor:pointer">VIRO XYZ</div>
    <div class="search-area">
        <input type="text" id="urlInp" placeholder="Enter URL or search term..." autocomplete="off">
    </div>
</nav>

<!-- The Internal Viewer -->
<iframe is="x-frame-bypass" id="contentFrame"></iframe>

<!-- The Home UI -->
<div class="home-ui" id="homeUI">
    <h1 class="hero-title">Viro XYZ</h1>
    <p class="hero-sub">learning platform</p>
    
    <div class="card-grid">
        <div class="card" onclick="loadSite('https://www.wikipedia.org')"><h3>Wikipedia</h3><p>Research Library</p></div>
        <div class="card" onclick="loadSite('https://poki.com')"><h3>Games</h3><p>Activity Hub</p></div>
        <div class="card" onclick="loadSite('bio.html')"><h3>Bio</h3><p>System Logs</p></div>
    </div>
</div>

<script>
const urlInp = document.getElementById('urlInp');
const frame = document.getElementById('contentFrame');
const homeUI = document.getElementById('homeUI');

function loadSite(url) {
    homeUI.style.display = 'none';
    frame.style.display = 'block';
    frame.src = url;
}

function goHome() {
    frame.style.display = 'none';
    homeUI.style.display = 'flex';
    frame.src = "";
}

urlInp.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        let val = urlInp.value.trim();
        if(!val) return;

        let finalUrl;
        if (val.includes('.') && !val.includes(' ')) {
            finalUrl = val.startsWith('http') ? val : 'https://' + val;
        } else {
            // Search via DuckDuckGo (often more iframe-friendly than Google)
            finalUrl = 'https://duckduckgo.com' + encodeURIComponent(val);
        }
        loadSite(finalUrl);
    }
});
</script>

</body>
</html>
