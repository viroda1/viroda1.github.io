<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viro XYZ | Interstellar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
    --accent: #ff4aff;
    --accent2: #46f0f0;
    --bg: #000; /* pure black void */
    --glass: rgba(255, 255, 255, 0.05);
    --border: rgba(70, 240, 240, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }

body {
    background: var(--bg);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* Purple stars background */
body::before {
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: radial-gradient(circle, #8b00ff 1px, transparent 1px) repeat;
    background-size: 5px 5px;
    opacity:0.3;
    z-index:-2;
    animation: starTwinkle 30s linear infinite;
}

@keyframes starTwinkle {
    0% {background-position:0 0;}
    100% {background-position:1000px 1000px;}
}

/* Navbar */
.nav-bar { 
    display: flex; align-items: center; padding: 12px 25px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
    z-index: 10;
    position: relative;
}

.logo { font-weight: 700; color: var(--accent); font-size: 1.1rem; cursor:pointer; letter-spacing: 1px; }

.search-area { flex-grow: 1; position: relative; }

#urlInp { width:100%; background: var(--glass); border:1px solid var(--border); border-radius:12px; padding:10px 15px; color:#fff; font-size:0.9rem; outline:none; }
#urlInp:focus { border-color: var(--accent2); box-shadow: 0 0 15px rgba(70,240,240,0.4); }

/* Loading Bar */
.loading { position:absolute; bottom:-2px; left:0; height:2px; width:0%; background: var(--accent); transition: width 0.4s ease; }

/* Content Frame */
#contentFrame { flex-grow:1; width:100%; border:none; display:none; animation: fadeIn 0.5s ease; background:#111; }

/* Home UI */
.home-ui { flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; animation: fadeIn 0.5s ease; z-index:1; }

.hero-title { font-size:4rem; font-weight:700; background: linear-gradient(90deg, #ff4aff, #46f0f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-sub { color:#777; letter-spacing:6px; font-size:0.8rem; margin-bottom:40px; text-transform:uppercase; }

/* Cards */
.card-grid { display:flex; gap:20px; max-width:800px; flex-wrap:wrap; justify-content:center; }
.card { background: var(--glass); border:1px solid var(--border); padding:20px; border-radius:18px; flex:1; min-width:180px; cursor:pointer; transition:0.25s; text-align:center; }
.card:hover { border-color: var(--accent2); background: rgba(70,240,240,0.05); transform: translateY(-6px); box-shadow: 0 15px 40px rgba(70,240,240,0.25); }

/* Config Panel */
#configPanel {
    position: fixed; top:50px; right:20px;
    background: rgba(0,0,0,0.85); border:1px solid var(--border); border-radius:12px;
    padding:15px; display:none; flex-direction:column; gap:10px; z-index:20;
    backdrop-filter: blur(15px);
}

#configPanel label { font-size:0.85rem; color:#aaa; margin-bottom:4px; }
#configPanel input, #configPanel select { padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--glass); color:#fff; outline:none; }

/* Animations */
@keyframes fadeIn { from{opacity:0; transform:scale(0.98);} to{opacity:1; transform:scale(1);} }
</style>
</head>
<body>

<nav class="nav-bar">
    <div class="logo" onclick="goHome()">Viro XYZ</div>
    <div class="search-area">
        <input type="text" id="urlInp" placeholder="Enter URL or search..." autocomplete="off">
        <div class="loading" id="loadingBar"></div>
    </div>
    <button onclick="toggleConfig()" style="margin-left:15px;padding:6px 10px;border:none;border-radius:8px;background:var(--accent);color:#000;cursor:pointer;">⚙️ Config</button>
</nav>

<iframe id="contentFrame"></iframe>

<div class="home-ui" id="homeUI">
    <h1 class="hero-title">Viro XYZ</h1>
    <p class="hero-sub">Interstellar Proxy Mode</p>
    <div class="card-grid">
        <div class="card" onclick="loadSite('https://www.wikipedia.org')"><h3>Wikipedia</h3><p>Research Hub</p></div>
        <div class="card" onclick="loadSite('https://poki.com')"><h3>Games</h3><p>Activity Portal</p></div>
        <div class="card" onclick="loadSite('bio.html')"><h3>Bio</h3><p>System Logs</p></div>
    </div>
</div>

<!-- Config Panel -->
<div id="configPanel">
    <label for="starDensity">Star Density:</label>
    <input type="range" id="starDensity" min="1" max="20" value="5">
    
    <label for="accentColor">Accent Color:</label>
    <input type="color" id="accentColor" value="#ff4aff">
    
    <button onclick="applySettings()" style="background:var(--accent2);color:#000;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;">Apply</button>
</div>

<script>
const urlInp = document.getElementById('urlInp');
const frame = document.getElementById('contentFrame');
const homeUI = document.getElementById('homeUI');
const loadingBar = document.getElementById('loadingBar');
const configPanel = document.getElementById('configPanel');
const starLayer = document.body;

function loadSite(url){
    homeUI.style.display='none';
    frame.style.display='block';
    loadingBar.style.width="30%";
    setTimeout(()=>loadingBar.style.width="70%",200);
    frame.src=url;
    frame.onload=()=>{loadingBar.style.width="100%"; setTimeout(()=>loadingBar.style.width="0%",300);}
}

function goHome(){
    frame.style.display='none';
    homeUI.style.display='flex';
    frame.src="";
}

urlInp.addEventListener('keypress',(e)=>{
    if(e.key==='Enter'){
        let val=urlInp.value.trim();
        if(!val) return;
        let finalUrl;
        if(val.includes('.') && !val.includes(' ')){
            finalUrl=val.startsWith('http')?val:'https://'+val;
        } else {
            finalUrl='https://duckduckgo.com/?q='+encodeURIComponent(val);
        }
        loadSite(finalUrl);
    }
});

document.addEventListener('keydown',(e)=>{
    if(e.key==='Escape'){ goHome(); }
});

window.onload=()=>{ urlInp.focus(); };

function toggleConfig(){
    configPanel.style.display = configPanel.style.display==='flex'?'none':'flex';
}

function applySettings(){
    const density = document.getElementById('starDensity').value;
    const accent = document.getElementById('accentColor').value;
    
    document.documentElement.style.setProperty('--accent', accent);
    
    // Adjust star size to simulate density
    starLayer.style.setProperty('--star-size', density+'px');
}
</script>

</body>
</html>
