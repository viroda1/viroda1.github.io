<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Viro XYZ - Dev AI</title>

<style>
body{
  margin:0;
  padding:0;
  font-family:monospace;
  background:#000;
  color:#a855f7;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
}

header{
  width:100%;
  padding:20px;
  text-align:center;
  border-bottom:1px solid #a855f7;
  font-size:24px;
}

#ai-container{
  width:90%;
  max-width:800px;
  margin-top:20px;
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#output{
  background:#000;
  border:1px solid #a855f7;
  flex:1;
  padding:15px;
  overflow-y:auto;
  white-space:pre-wrap;
}

#input-container{
  display:flex;
  margin-top:10px;
}

#input-container input{
  flex:1;
  padding:10px;
  background:#000;
  border:1px solid #a855f7;
  color:#a855f7;
}

#input-container button{
  padding:10px;
  border:1px solid #a855f7;
  background:#000;
  color:#a855f7;
  cursor:pointer;
}

#input-container button:hover{
  background:#a855f7;
  color:#000;
}
</style>
</head>

<body>

<header>Viro XYZ - Dev AI</header>

<div id="ai-container">
  <div id="output">> Welcome, Developer. Type a command below.</div>
  <div id="input-container">
    <input type="text" id="cmd" placeholder="Enter AI command">
    <button onclick="sendCommand()">RUN</button>
  </div>
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("cmd");

// fake AI responses
const aiResponses = {
  "hello":"Hello, Developer. How can I assist you today?",
  "status":"System running smoothly. No errors detected.",
  "help":"Available commands: hello, status, help, date, time, clear",
  "date":()=>`Today's date is ${new Date().toLocaleDateString()}`,
  "time":()=>`Current time is ${new Date().toLocaleTimeString()}`,
  "clear":()=>{output.innerText="> Welcome, Developer. Type a command below."; return ""; }
}

function sendCommand(){
  const cmd = input.value.trim().toLowerCase();
  if(cmd==="") return;
  
  output.innerText += `\n> ${cmd}`;

  if(aiResponses[cmd]){
    const resp = typeof aiResponses[cmd] === "function" ? aiResponses[cmd]() : aiResponses[cmd];
    if(resp) output.innerText += `\n${resp}`;
  } else {
    output.innerText += `\nUnknown command. Type 'help' for a list of commands.`;
  }

  output.scrollTop = output.scrollHeight;
  input.value="";
}

input.addEventListener("keypress", e=>{
  if(e.key==="Enter") sendCommand();
});
</script>

</body>
</html>
