<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro-XYZ // ELITE_CORE_v5.1</title>
    <script src="https://js.puter.com"></script>
    <style>
        :root { --glow: #a855f7; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.5; }
        #main-wrapper { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
        header { width: 100%; padding: 15px; text-align: center; border-bottom: 1px solid var(--glow); color: var(--glow); font-size: 20px; text-shadow: 0 0 8px var(--glow); letter-spacing: 4px; }
        #ai-container { width: 92%; max-width: 1100px; margin-top: 15px; flex: 1; display: flex; flex-direction: column; margin-bottom: 20px; }
        #output { background: rgba(0, 0, 0, 0.5); border: 1px solid var(--glow); flex: 1; padding: 20px; overflow-y: auto; white-space: pre-wrap; color: var(--glow); scrollbar-width: thin; scrollbar-color: var(--glow) transparent; line-height: 1.4; }
        #input-container { display: flex; margin-top: 15px; gap: 10px; }
        #input-container input { flex: 1; padding: 12px; background: rgba(0,0,0,0.9); border: 1px solid var(--glow); color: var(--glow); outline: none; font-size: 16px; font-family: inherit; }
        #input-container button { padding: 0 30px; border: 1px solid var(--glow); background: transparent; color: var(--glow); cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit; }
        #input-container button:hover { background: var(--glow); color: #000; box-shadow: 0 0 15px var(--glow); }
        .gen-image { max-width: 100%; height: auto; border: 1px solid var(--glow); margin: 15px 0; display: block; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-thumb { background: var(--glow); }
    </style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div id="main-wrapper">
    <header>VIRO-XYZ // QUANTUM_LINK_v5.1</header>
    <div id="ai-container">
        <div id="output">>> SYSTEM BOOT: SUCCESSFUL
>> MODEL_LINK: llama-3.1-8b-instant [ACTIVE]
>> COMMANDS: 'draw [prompt]' for images | 'clear' to reset.</div>
        <div id="input-container">
            <input type="text" id="cmd" placeholder="Enter command..." autocomplete="off" autofocus>
            <button onclick="sendCommand()">RUN</button>
        </div>
    </div>
</div>

<script>
    // --- MATRIX RAIN ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$+-*/=%&_<>[]";
    const fontSize = 14; const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // --- AI CONFIG ---
    // Using the newer model ID you just allowed
    const GROQ_KEY = "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";
    const MODEL_ID = "llama-3.1-8b-instant"; 
    let chatHistory = [{ role: "system", content: "You are VIRO-XYZ, a terminal AI. Be brief, technical, and use hacker-style slang." }];
    let isBusy = false;
    const output = document.getElementById("output");
    const input = document.getElementById("cmd");

    async function sendCommand() {
        if (isBusy) return;
        const val = input.value.trim();
        if (!val) return;
        output.innerText += `\n\n> ${val}\n`;
        input.value = "";
        output.scrollTop = output.scrollHeight;

        if (val.toLowerCase().startsWith("draw ")) {
            await generateImage(val.substring(5));
        } else if (val.toLowerCase() === "clear") {
            output.innerText = ">> TERMINAL BUFFER PURGED."; 
            chatHistory = [{ role: "system", content: "You are VIRO-XYZ, a terminal AI. Be brief, technical, and use hacker-style slang." }];
        } else {
            await callAI(val);
        }
    }

    async function generateImage(prompt) {
        isBusy = true;
        typeEffect(`COMMENCING NEURAL RENDER: "${prompt}"...`);
        try {
            const imageElement = await puter.ai.txt2img(prompt);
            imageElement.className = "gen-image";
            output.appendChild(imageElement);
            typeEffect("RENDER SEQUENCE COMPLETE.");
        } catch (e) {
            typeEffect("CRITICAL_ERR: IMAGE_GEN_FAILED");
        } finally { isBusy = false; }
    }

    async function callAI(prompt) {
        isBusy = true; 
        typeEffect("PROCESSING...");
        chatHistory.push({ role: "user", content: prompt });
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: MODEL_ID, messages: chatHistory, temperature: 0.5 })
            });
            const data = await res.json();
            
            // Cleanup "PROCESSING..." text
            const lines = output.innerText.split("\n");
            if (lines[lines.length-1].includes("PROCESSING...")) lines.pop();
            output.innerText = lines.join("\n");

            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: reply });
                typeEffect(reply);
            } else {
                typeEffect("ERR: EMPTY_PACKET_RECEIVED. CHECK GROQ USAGE QUOTA.");
            }
        } catch (e) { 
            typeEffect("UPLINK_FAILURE: TIMEOUT OR FIREWALL BLOCK."); 
        } finally { isBusy = false; }
    }

    function typeEffect(text) {
        let i = 0; 
        const speed = text.length > 150 ? 2 : 12;
        const interval = setInterval(() => {
            output.innerText += text[i]; i++;
            if (i >= text.length) { 
                clearInterval(interval); 
                output.innerText += "\n"; 
                output.scrollTop = output.scrollHeight;
            }
        }, speed);
    }
    input.addEventListener("keydown", e => { if (e.key === "Enter") sendCommand(); });
</script>
</body>
</html>
