<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro XYZ - Dev AI v3.0</title>
    <style>
        :root {
            --glow-color: #a855f7;
            --bg-color: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Matrix Canvas */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; z-index: 1;
        }

        /* Terminal Overlay */
        #main-wrapper {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; background: rgba(0, 0, 0, 0.7); /* Translucent */
            backdrop-filter: blur(2px);
        }

        header {
            width: 100%; padding: 20px; text-align: center;
            border-bottom: 1px solid var(--glow-color);
            color: var(--glow-color); font-size: 24px;
            text-shadow: 0 0 10px var(--glow-color);
        }

        #ai-container {
            width: 90%; max-width: 900px; margin-top: 20px;
            flex: 1; display: flex; flex-direction: column; margin-bottom: 20px;
        }

        #output {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glow-color);
            flex: 1; padding: 20px; overflow-y: auto;
            white-space: pre-wrap; color: var(--glow-color);
            box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.2);
        }

        #input-container { display: flex; margin-top: 15px; gap: 10px; }
        #input-container input {
            flex: 1; padding: 12px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--glow-color); color: var(--glow-color);
            outline: none; font-family: inherit;
        }

        #input-container button {
            padding: 0 25px; border: 1px solid var(--glow-color);
            background: transparent; color: var(--glow-color);
            cursor: pointer; font-family: inherit; font-weight: bold;
        }

        #input-container button:hover {
            background: var(--glow-color); color: #000;
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="main-wrapper">
    <header>VIRO XYZ // QUANTUM_CORE_v3</header>
    <div id="ai-container">
        <div id="output">>> MATRIX INITIALIZED...
>> WAITING FOR INPUT...</div>
        <div id="input-container">
            <input type="text" id="cmd" placeholder="Ask the AI or run a command..." autocomplete="off" autofocus>
            <button onclick="sendCommand()">RUN</button>
        </div>
    </div>
</div>

<script>
    // --- MATRIX RAIN EFFECT ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "ABCDEFGHIJKLMNOPRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; // Classic Matrix Green
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    // --- TERMINAL LOGIC ---
    const output = document.getElementById("output");
    const input = document.getElementById("cmd");

    async function sendCommand() {
        const val = input.value.trim();
        if (!val) return;
        
        output.innerText += `\n\n> ${val}\n`;
        input.value = "";

        if (val.toLowerCase() === "help") {
            typeEffect("Commands: ai [question], clear, color [hex], whoami");
        } else if (val.toLowerCase().startsWith("ai ")) {
            typeEffect("Connecting to Neural Net... [Requires API Integration]");
            // callAI(val.substring(3)); 
        } else if (val.toLowerCase() === "clear") {
            output.innerText = ">> Terminal Reset.";
        } else {
            typeEffect(`Searching local databanks for '${val}'... No match found.`);
        }
        output.scrollTop = output.scrollHeight;
    }

    function typeEffect(text) {
        let i = 0;
        const interval = setInterval(() => {
            output.innerText += text[i];
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                output.innerText += "\n";
            }
            output.scrollTop = output.scrollHeight;
        }, 20);
    }

    input.addEventListener("keydown", e => { if (e.key === "Enter") sendCommand(); });
</script>

</body>
</html>
