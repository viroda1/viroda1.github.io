<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Resource Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
    background:#0b0a0f;
    font-family:'Inter',sans-serif;
    color:#f2eaff;
    display:flex;
    justify-content:center;
    padding:2rem;
}

.main {
    max-width:1200px;
    width:100%;
}

h1 {
    text-align:center;
    font-size:3rem;
    background:linear-gradient(145deg,#d4c0ff,#9f5eff);
    -webkit-background-clip:text;
    color:transparent;
}

.sub {
    text-align:center;
    color:#bcb0da;
    margin-top:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.card {
    background:#141020;
    padding:20px;
    border-radius:20px;
    border:1px solid #3b2a55;
    text-decoration:none;
    color:white;
    transition:0.2s;
}

.card:hover {
    transform:translateY(-5px);
    border-color:#b47aff;
}

.icon {
    font-size:2rem;
    margin-bottom:10px;
}

.title {
    font-size:1.2rem;
    font-weight:600;
}

.desc {
    font-size:0.9rem;
    color:#aaa;
    margin-top:5px;
}
</style>
</head>

<body>
<div class="main">

<h1>Student Portal 📁</h1>
<div class="sub">resources · tools · portals · everything you need</div>

<div class="grid" id="grid"></div>

</div>

<script>
async function load() {
    const res = await fetch('games.json');
    const data = await res.json();

    document.getElementById('grid').innerHTML = '';

    data.forEach(item => {
        const card = document.createElement('a');
        card.href = item.url;
        card.target = "_blank";
        card.className = "card";

        card.innerHTML = `
            <div class="icon"><i class="${item.icon || 'fas fa-link'}"></i></div>
            <div class="title">${item.title}</div>
            <div class="desc">${item.description || ''}</div>
        `;

        document.getElementById('grid').appendChild(card);
    });
}

load();
</script>

</body>
</html>
