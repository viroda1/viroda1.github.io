<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* box */
.login-box{
  border:1px solid #fff;
  padding:20px;
  width:300px;
}

/* inputs */
input{
  width:100%;
  margin:10px 0;
  padding:8px;
  background:#000;
  color:#fff;
  border:1px solid #fff;
  font-family:monospace;
}

/* button */
button{
  width:100%;
  padding:10px;
  background:#000;
  color:#fff;
  border:1px solid #fff;
  cursor:pointer;
}

button:hover{
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>> login</h2>

  <input type="text" id="user" placeholder="username">
  <input type="password" id="pass" placeholder="password">

  <button onclick="login()">enter</button>
</div>

<script>
function login(){
  // no validation 😈 anything works
  window.location.href = "index.html";
}
</script>

</body>
</html>
