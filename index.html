<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viroda1 Plunks Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #888888;
            font-size: 1.1rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .link-card {
            background: rgba(20, 15, 35, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            cursor: pointer;
        }

        .link-card:hover {
            transform: translateY(-8px);
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.2);
        }

        .link-icon {
            font-size: 2.5rem;
            color: #a855f7;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 12px;
        }

        .link-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
        }

        .link-description {
            font-size: 0.95rem;
            color: #aaaaaa;
            line-height: 1.5;
            flex-grow: 1;
        }

        .link-footer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #a855f7;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .link-footer i {
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-footer i {
            transform: translateX(4px);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #888888;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 1.5rem;
            color: #fca5a5;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #a855f7;
        }

        .stat-label {
            color: #888888;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Viroda1 Plunks Hub</h1>
            <p class="subtitle">Access all your Plunker projects in one place</p>
        </header>

        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>Loading your Plunks...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadLinks() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/viroda1/viroda1.github.io/refs/heads/main/links.JSON');
                if (!response.ok) throw new Error('Failed to fetch links');
                
                const data = await response.json();
                const links = data.links || [];

                if (links.length === 0) {
                    document.getElementById('content').innerHTML = '<div class="error">No links found. Please check your links.JSON file.</div>';
                    return;
                }

                let html = '<div class="links-grid">';
                links.forEach(link => {
                    const icon = link.icon || 'fa-solid fa-link';
                    html += `
                        <a href="${link.url}" target="_blank" class="link-card">
                            <div class="link-icon">
                                <i class="${icon}"></i>
                            </div>
                            <div class="link-title">${link.title}</div>
                            <div class="link-description">${link.description}</div>
                            <div class="link-footer">
                                <span>Open</span>
                                <i class="fas fa-arrow-right"></i>
                            </div>
                        </a>
                    `;
                });
                html += '</div>';

                html += `
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value">${links.length}</div>
                            <div class="stat-label">Plunks Available</div>
                        </div>
                    </div>
                `;

                document.getElementById('content').innerHTML = html;
            } catch (error) {
                console.error('Error loading links:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-circle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>Failed to load links. Please try again later.</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Load links when page loads
        window.addEventListener('load', loadLinks);
    </script>
</body>
</html>
