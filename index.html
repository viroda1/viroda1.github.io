<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Resource Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
    font-family:'Inter',sans-serif;
    margin:0;
    padding:2rem;
    color:#f2eaff;
    display:flex;
    justify-content:center;
    min-height:100vh;
    background: linear-gradient(270deg, #0b0a0f, #1c0f2c, #0b0a0f);
    background-size: 600% 600%;
    animation: gradientBG 20s ease infinite;
    overflow-x:hidden;
}

@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.main { max-width:1200px; width:100%; }

h1 {
    text-align:center;
    font-size:3rem;
    background:linear-gradient(145deg,#d4c0ff,#9f5eff);
    -webkit-background-clip:text;
    color:transparent;
    margin-bottom:0;
}

.sub { text-align:center; color:#bcb0da; margin-top:5px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.card {
    background:#141020;
    padding:20px;
    border-radius:20px;
    border:1px solid #3b2a55;
    text-decoration:none;
    color:white;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.card:hover {
    transform: translateY(-7px) scale(1.03);
    border-color:#b47aff;
    box-shadow:0 12px 25px rgba(180,122,255,0.3);
}

.card::before {
    content:'';
    position:absolute;
    top:0; left:-75%;
    width:50%; height:100%;
    background: linear-gradient(120deg, rgba(255,255,255,0.15), rgba(180,122,255,0.15), rgba(255,255,255,0.15));
    transform: skewX(-25deg);
    transition:0.5s;
}

.card:hover::before { left:125%; }

.icon { font-size:2.2rem; margin-bottom:12px; transition:0.3s; }
.card:hover .icon { transform: rotate(10deg) scale(1.2); }
.title { font-size:1.3rem; font-weight:600; }
.category { font-size:0.8rem; color:#aaa; margin-top:5px; }
</style>
</head>

<body>
<div class="main">
<h1>Student Portal 📁</h1>
<div class="sub">resources · tools · portals · everything you need</div>
<div class="grid" id="grid"></div>
</div>

<script>
async function loadJSON(file) {
    try {
        const res = await fetch(file);
        const data = await res.json();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        data.items.forEach(item => {
            const card = document.createElement('a');
            card.href = item.url;
            card.target = "_blank";
            card.className = "card";

            card.innerHTML = `
                <div class="icon"><i class="${item.icon || 'fas fa-link'}"></i></div>
                <div class="title">${item.title}</div>
                <div class="category">${item.category || ''}</div>
            `;

            grid.appendChild(card);
        });
    } catch(err) {
        console.error("Failed to load JSON:", err);
    }
}

// Initial load
let currentFile = 'games.json';
loadJSON(currentFile);

// Hotkey switching example
document.addEventListener('keydown', e => {
    if(e.key === '1') { currentFile = '1.json'; loadJSON(currentFile); }
    if(e.key === '2') { currentFile = '2.json'; loadJSON(currentFile); }
});
</script>
</body>
</html>
