<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* login box */
.login-box{
  border:1px solid #fff;
  padding:20px;
  width:300px;
}

/* inputs */
input{
  width:100%;
  margin:10px 0;
  padding:8px;
  background:#000;
  color:#fff;
  border:1px solid #fff;
  font-family:monospace;
}

/* button */
button{
  width:100%;
  padding:10px;
  background:#000;
  color:#fff;
  border:1px solid #fff;
  cursor:pointer;
}

button:hover{
  background:#fff;
  color:#000;
}

/* fake terminal text */
h2::after{
  content:"_";
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}
</style>
</head>

<body>

<div class="login-box">
  <h2>> login</h2>

  <input type="text" id="user" placeholder="username">
  <input type="password" id="pass" placeholder="password">

  <button onclick="login()">> authenticate</button>
</div>

<script>
function login(){
  const user = document.getElementById("user").value.toLowerCase();
  const pass = document.getElementById("pass").value.toLowerCase();

  // 👑 SECRET ADMIN LOGIN
  if(user === "viro" && pass === "admin"){
    window.location.href = "VIRO.html";
  } else {
    // normal login (anything works)
    window.location.href = "home.html";
  }
}
</script>

</body>
</html>
