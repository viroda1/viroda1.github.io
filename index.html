<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Resources</title><style>
:root{
    --bg:#000;
    --text:#8ffcff;
    --accent:#8ffcff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:monospace;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* LOGIN */
#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.panel{
    width:320px;
    padding:25px;
    border:1px solid var(--accent);
    background:#000;
    box-shadow:0 0 25px var(--accent);
}

.title{
    text-align:center;
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    margin:10px 0;
    padding:10px;
    background:#000;
    border:1px solid var(--accent);
    color:var(--text);
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    background:var(--accent);
    border:none;
    color:#000;
    cursor:pointer;
}

/* LOADING */
#loading{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* DASH */
#dash{
    display:none;
    padding:20px;
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.cards{
    display:flex;
    gap:10px;
}

.card{
    padding:15px;
    border:1px solid var(--accent);
    cursor:pointer;
}

/* SUPPORT */
#supportPanel{
    display:none;
    padding:20px;
}

/* SECRET MENU */
#secretMenu{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#000;
    border:1px solid var(--accent);
    padding:20px;
    display:none;
    z-index:999;
}
</style></head><body><!-- LOGIN --><div id="login">
    <div class="panel">
        <div class="title">SCHOOL RESOURCE</div>
        <input id="user" placeholder="USERNAME">
        <input id="pass" type="password" placeholder="PASSWORD">
        <button onclick="handleLogin()">LOGIN</button>
    </div>
</div><!-- LOADING --><div id="loading">
    <h2 id="loadingText">Authenticating...</h2>
</div><!-- DASH --><div id="dash">
    <div class="top">
        <div>DASHBOARD</div>
        <button onclick="openBio()">≡</button>
    </div><div class="cards">
    <div class="card" onclick="goOther()">Subjects</div>
    <div class="card" onclick="goHome()">Home</div>
    <div class="card" onclick="openSupport()">Help</div>
</div>

</div><!-- SUPPORT --><div id="supportPanel">
    <h3>ACADEMIC SUPPORT</h3>
    <p id="status">Awaiting request...</p>
    <button onclick="simulateSupport()">Request Help</button>
    <button onclick="closeSupport()">Close</button>
</div><!-- SECRET MENU --><div id="secretMenu">
    <h3>THEMES</h3>
    <button onclick="setTheme('default')">Default</button>
    <button onclick="setTheme('ixl')">IXL</button>
    <button onclick="setTheme('iready')">I-Ready</button>
    <button onclick="setTheme('backpack')">MyBackpack</button>
    <button onclick="closeSecret()">Close</button>
</div><script>
const user=document.getElementById("user");
const pass=document.getElementById("pass");

const login=document.getElementById("login");
const loading=document.getElementById("loading");
const dash=document.getElementById("dash");
const supportPanel=document.getElementById("supportPanel");
const secretMenu=document.getElementById("secretMenu");

/* LOGIN */
function handleLogin(){
    login.style.display="none";
    loading.style.display="flex";

    const messages=[
        "Authenticating...",
        "Verifying credentials...",
        "Accessing student node...",
        "Loading system..."
    ];

    let i=0;
    const text=document.getElementById("loadingText");

    const interval=setInterval(()=>{
        text.innerText=messages[i % messages.length];
        i++;
    },400);

    setTimeout(()=>{
        clearInterval(interval);

        const u=user.value.trim();
        const p=pass.value.trim();

        if(u==="" && p===""){ location.href="home.html"; return; }
        if(u==="Viro" && p==="xyz"){ location.href="browser.html"; return; }
        if(u==="dev" && p==="zyx"){ location.href="dev.html"; return; }

        // fallback: show dashboard instead of reload
        loading.style.display="none";
        dash.style.display="block";

    },1200);
}

/* NAV */
function goHome(){ location.href="home.html"; }
function goOther(){ location.href="other.html"; }
function openBio(){ location.href="bio.html"; }

/* SUPPORT */
function openSupport(){
    dash.style.display="none";
    supportPanel.style.display="block";
}

function closeSupport(){
    supportPanel.style.display="none";
    dash.style.display="block";
}

function simulateSupport(){
    const s=document.getElementById("status");

    s.innerText="Connecting...";
    setTimeout(()=>{s.innerText="Assistant reviewing...";},1500);
    setTimeout(()=>{s.innerText="Continue coursework.";},3000);
    setTimeout(()=>{s.innerText="Session ended.";},4500);
}

/* SECRET KEY ($ OR SHIFT+4 fallback) */
document.addEventListener("keydown",(e)=>{
    if(e.key==="$" || (e.shiftKey && e.key==="4")){
        secretMenu.style.display="block";
    }
});

function closeSecret(){
    secretMenu.style.display="none";
}

/* THEMES */
function setTheme(t){
    if(t==="default"){
        document.documentElement.style.cssText="--bg:#000;--text:#8ffcff;--accent:#8ffcff;";
    }
    if(t==="ixl"){
        document.documentElement.style.cssText="--bg:#f5f7fb;--text:#000;--accent:#0057ff;";
    }
    if(t==="iready"){
        document.documentElement.style.cssText="--bg:#fff;--text:#000;--accent:#ff6a00;";
    }
    if(t==="backpack"){
        document.documentElement.style.cssText="--bg:#eef2f5;--text:#000;--accent:#2a7fff;";
    }
}

/* ENTER KEY */
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){handleLogin();}
});

/* MOBILE FIX */
user.setAttribute("autocapitalize","off");
pass.setAttribute("autocapitalize","off");
</script></body>
</html>
