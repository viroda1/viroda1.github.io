<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viros Book | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-gradient: linear-gradient(#000, #111);
    --accent: #ff4aff;
    --text: #fff;
    --input-bg: #111;
    --border: rgba(255,255,255,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
body{
    background: var(--bg-gradient);
    color: var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Login Panel */
#login-panel{
    background: rgba(0,0,0,0.85);
    padding:40px 30px;
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 0 25px var(--accent);
    text-align:center;
    width:320px;
}

#login-panel h1{
    margin-bottom:20px;
    color: var(--accent);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    outline:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background: var(--accent);
    color:#000;
    font-weight:700;
    border:none;
    cursor:pointer;
    border-radius:8px;
    transition: transform 0.2s ease;
}

button:hover{transform: scale(1.05);}

/* Cosmic background canvas */
#starCanvas{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:-1;
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="login-panel">
    <h1>Viros Book Login</h1>
    <input id="user" type="text" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="handleLogin()">Sign In / Register Now!</button>
</div>

<script>
// Cosmic stars background
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createStars(count=200){
    stars=[];
    for(let i=0;i<count;i++){
        stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,radius:Math.random()*1.5+0.5,alpha:Math.random()});
    }
}
function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,'+s.alpha+')';
        ctx.fill();
    });
}
function animateStars(){
    stars.forEach(s=>{s.alpha+=(Math.random()-0.5)*0.02; if(s.alpha<0)s.alpha=0;if(s.alpha>1)s.alpha=1;});
    drawStars();
    requestAnimationFrame(animateStars);
}
createStars();
animateStars();

// Login logic
function handleLogin(){
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();

    if(u==="" && p===""){ window.location.href="home.html"; return; }
    if(u==="admin" && p==="bread"){ window.location.href="games.html"; return; }
    if(u==="Viro" && p==="xyz"){ window.location.href="browser.html"; return; }
    if(u==="dev" && p==="zyx"){ window.location.href="dev.html"; return; }

    alert("Login failed! Check your username and password.");
}
document.addEventListener("keydown",(e)=>{if(e.key==="Enter") handleLogin();});
</script>

</body>
</html>
