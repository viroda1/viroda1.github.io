<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes</title> <!-- Cloaked Tab Name -->
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com"> <!-- Cloaked Icon -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #bc13fe; --bg: #0a0a0a; --card: rgba(188, 19, 254, 0.05); --border: rgba(188, 19, 254, 0.2); }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        header { backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); padding: 20px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        #searchBar { width: 80%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 20px rgba(188, 19, 254, 0.3); }
        .tag { font-size: 0.6rem; color: var(--accent); display: block; margin-bottom: 5px; opacity: 0.7; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div style="color:var(--accent); font-weight:700; margin-bottom:10px;">VIROS // BROWSER</div>
        <input type="text" id="searchBar" placeholder="Find a game..." onkeyup="search()">
    </header>

    <div class="container">
        <div class="games-grid" id="gameContainer">Loading Cosmic Library...</div>
    </div>

    <script>
        // Panic Key (P) for APS-Jean Childs Young MS
        window.onkeydown = (e) => { if(e.key.toLowerCase() === 'p') window.location.href = 'https://young.atlantapublicschools.us'; };

        // Fetch Games from your data.json
        async function loadGames() {
            const response = await fetch('data.json');
            const games = await response.json();
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';

            games.forEach(game => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `<span class="tag">${game.tag}</span>${game.name}`;
                div.onclick = () => openGame(game.url);
                container.appendChild(div);
            });
        }

        // About:Blank Cloaking Logic
        function openGame(url) {
            var win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none'; iframe.style.width = '100%'; iframe.style.height = '100%';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        function search() {
            let filter = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(filter) ? "block" : "none";
            }
        }

        loadGames();
    </script>
</body>
  </html>
