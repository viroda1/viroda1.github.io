<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes</title> <!-- Tab name cloaked -->
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com"> <!-- Favicon cloaked -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --accent: #bc13fe; 
            --bg: #0a0a0a; 
            --card: rgba(188, 19, 254, 0.05); 
            --border: rgba(188, 19, 254, 0.2); 
        }
        
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }
        
        header { 
            backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); 
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; 
        }
        
        #searchBar { 
            width: 80%; max-width: 500px; padding: 12px; border-radius: 25px; 
            border: 1px solid var(--border); background: rgba(255,255,255,0.05); 
            color: white; outline: none; transition: 0.3s;
        }
        #searchBar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }

        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .game-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 15px; 
            padding: 25px; text-align: center; cursor: pointer; transition: 0.4s; 
        }
        .game-card:hover { 
            transform: translateY(-8px); border-color: var(--accent); 
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.3); background: rgba(188, 19, 254, 0.1); 
        }
        .tag { font-size: 0.6rem; color: var(--accent); display: block; margin-bottom: 5px; opacity: 0.8; font-weight: 700; }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <header>
        <div id="logo" style="color:var(--accent); font-weight:700; letter-spacing: 2px; margin-bottom:15px;">VIROS // BROWSER</div>
        <input type="text" id="searchBar" placeholder="Find a hidden node..." onkeyup="search()">
    </header>

    <div class="container">
        <div class="games-grid" id="gameContainer">Loading Cosmic Library...</div>
    </div>

    <script>
        // 1. PANIC KEY (P) - Instant redirect to APS school site
        window.onkeydown = (e) => { 
            if(e.key.toLowerCase() === 'p') window.location.href = 'https://young.atlantapublicschools.us'; 
        };

        // 2. LOAD DATA.JSON
        async function loadGames() {
            try {
                const response = await fetch('data.json');
                const games = await response.json();
                const container = document.getElementById('gameContainer');
                container.innerHTML = '';

                games.forEach(game => {
                    const div = document.createElement('div');
                    div.className = 'game-card';
                    div.innerHTML = `<span class="tag">${game.tag}</span>${game.name}`;
                    div.onclick = () => openGame(game.url);
                    container.appendChild(div);
                });
            } catch (err) {
                document.getElementById('gameContainer').innerText = "Error loading library. Check data.json!";
            }
        }

        // 3. ABOUT:BLANK CLOAKING (Watermelon Fix)
        function openGame(url) {
            const win = window.open('about:blank', '_blank');
            if (!win || win.closed) {
                window.location.href = url; // Fallback
                return;
            }
            
            win.document.title = "Google Drive";
            const link = win.document.createElement('link');
            link.rel = 'icon'; link.href = 'https://ssl.gstatic.com';
            win.document.head.appendChild(link);

            const iframe = win.document.createElement('iframe');
            iframe.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; border:none;";
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        // 4. SEARCH SYSTEM
        function search() {
            let filter = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(filter) ? "block" : "none";
            }
        }

        // 5. PURPLE STAR ANIMATION
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
        window.onresize = resize; resize();
        for(let i=0;i<150;i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.5, a:Math.random()});
        function animate(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            stars.forEach(s=>{
                ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
                ctx.fillStyle=`rgba(188, 19, 254, ${s.a})`; ctx.fill();
                s.a += (Math.random()-0.5)*0.02; if(s.a<0)s.a=0; if(s.a>1)s.a=1;
            });
            requestAnimationFrame(animate);
        }

        loadGames();
        animate();
    </script>
</body>
</html>
