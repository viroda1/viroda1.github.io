<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes</title> <!-- Tab name cloaked -->
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com"> <!-- Favicon cloaked -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #bc13fe; 
            --bg: #0a0a0a; 
            --card: rgba(188, 19, 254, 0.05); 
            --border: rgba(188, 19, 254, 0.2); 
        }
        
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; overflow-x: hidden; }
        #starCanvas { position: fixed; top: 0; left: 0; z-index: -1; }
        
        header { 
            backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); 
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; 
        }
        
        #searchBar { 
            width: 80%; max-width: 500px; padding: 12px; border-radius: 25px; 
            border: 1px solid var(--border); background: rgba(255,255,255,0.05); 
            color: white; outline: none; transition: 0.3s; font-family: 'Outfit', sans-serif;
        }
        #searchBar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }

        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        
        .game-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 15px; 
            padding: 20px 15px; text-align: center; cursor: pointer; transition: 0.4s; 
            display: flex; flex-direction: column; gap: 8px;
        }
        .game-card:hover { 
            transform: translateY(-8px); border-color: var(--accent); 
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.3); background: rgba(188, 19, 254, 0.1); 
        }
        .tag { 
            font-size: 0.7rem; color: var(--accent); display: inline-block; 
            padding: 4px 8px; border-radius: 20px; background: rgba(188, 19, 254, 0.1);
            border: 1px solid var(--border); margin-bottom: 5px; font-weight: 700; 
            align-self: center;
        }
        .game-name { font-size: 1rem; font-weight: 500; line-height: 1.3; }
        .error-message { 
            grid-column: 1/-1; text-align: center; color: var(--accent); 
            padding: 40px; font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>
    <header>
        <div id="logo" style="color:var(--accent); font-weight:700; letter-spacing: 2px; margin-bottom:15px;">VIROS // BROWSER</div>
        <input type="text" id="searchBar" placeholder="Find a hidden node..." onkeyup="search()">
    </header>

    <div class="container">
        <div class="games-grid" id="gameContainer">Loading Cosmic Library...</div>
    </div>

    <script>
        // 1. PANIC KEY (P) - Instant redirect to APS school site
        window.onkeydown = (e) => { 
            if(e.key.toLowerCase() === 'p') window.location.href = 'https://young.atlantapublicschools.us'; 
        };

        // 2. LOAD DATA.JSON
        async function loadGames() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const games = await response.json();
                const container = document.getElementById('gameContainer');
                container.innerHTML = '';

                games.forEach(game => {
                    const div = document.createElement('div');
                    div.className = 'game-card';
                    div.innerHTML = `<span class="tag">${game.tag}</span><span class="game-name">${game.name}</span>`;
                    div.onclick = () => openGame(game.url);
                    container.appendChild(div);
                });
            } catch (err) {
                document.getElementById('gameContainer').innerHTML = `<div class="error-message">⚠️ Error loading library: ${err.message}<br><br>Make sure data.json exists in the same folder!</div>`;
                console.error('Error loading games:', err);
            }
        }

        // 3. ABOUT:BLANK CLOAKING (Watermelon Fix)
        function openGame(url) {
            const win = window.open('about:blank', '_blank');
            if (!win || win.closed) {
                window.location.href = url; // Fallback
                return;
            }
            
            win.document.title = "Google Drive";
            const link = win.document.createElement('link');
            link.rel = 'icon'; 
            link.href = 'https://ssl.gstatic.com';
            win.document.head.appendChild(link);

            const iframe = win.document.createElement('iframe');
            iframe.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; border:none; margin:0; padding:0;";
            iframe.src = url;
            iframe.setAttribute('allowfullscreen', 'true');
            iframe.setAttribute('allow', 'fullscreen; autoplay; clipboard-write; encrypted-media; picture-in-picture; gamepad');
            win.document.body.style.margin = '0';
            win.document.body.style.padding = '0';
            win.document.body.appendChild(iframe);
        }

        // 4. SEARCH SYSTEM
        function search() {
            let filter = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(filter) ? "flex" : "none";
            }
        }

        // 5. PURPLE STAR ANIMATION
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            initStars();
        }
        
        function initStars() {
            stars = [];
            for(let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width, 
                    y: Math.random() * canvas.height, 
                    r: Math.random() * 3 + 1, 
                    a: Math.random() * 0.7 + 0.3,
                    speed: Math.random() * 0.03 + 0.01
                });
            }
        }
        
        window.onresize = resize; 
        resize();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(188, 19, 254, ${s.a})`; 
                ctx.fill();
                
                // Twinkle effect
                s.a += (Math.random() - 0.5) * s.speed;
                if(s.a < 0.2) s.a = 0.2;
                if(s.a > 1) s.a = 1;
            });
            requestAnimationFrame(animate);
        }

        // Load games when page loads
        loadGames();
        animate();
    </script>
</body>
</html>
